name: nest-desktop
title: NEST Desktop
summary: A web-based GUI application for NEST Simulator. 
description: |
  Create spiking neuron models, run simulation and analyze the results.

  **Are you having issues?**

  Let us know by creating a new issue here: https://github.com/nest-desktop/nest-desktop-snap/issues
license: MIT
icon: snap/gui/nest-desktop.png
version: 3.2.0-rc2

base: core20
grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  nest-desktop:
    command: bin/desktop-launch
    desktop: usr/share/applications/nest-desktop.desktop
    extensions: [gnome-3-38]
    plugs:
      - browser-support # use functions essential for Web browsers
      # - desktop # provides access to common desktop elements
      # - desktop-legacy # enables the use of legacy desktop methods (including input method and accessibility services)
      - home # access non-hidden files in the home directory
      - network # enables network access
      - network-bind # operate as a network service
      - opengl # access OpenGL/GPU hardware
      - unity7 # allows interacting with Unity 7 services
      # - wayland # access compositors providing the Wayland protocol
      # - x11 # monitor mouse/keyboard input and graphics output of other apps

  # server-daemon:
  #   command: bin/nest-server start
  #   daemon: simple
  #   environment:
  #     NEST_SERVER_HOST: "127.0.0.1"
  #     NEST_SERVER_MODULES: nest,numpy
  #     NEST_SERVER_PORT: 52425
  #     NEST_SERVER_RESTRICTION_OFF: 1
  #     NEST_SERVER_STDOUT: 1
  #     PATH: ${SNAP}/bin:${PATH}
  #     PYTHONPATH: ${SNAP}/lib/python3.10/site-packages:${PYTHONPATH}
  #   install-mode: disable
  #   plugs:
  #     - network # enables network access
  #     - network-bind # operate as a network service
  #   refresh-mode: restart
  #   restart-condition: on-abnormal

parts:
  bsi-trigger:
    # See 'snapcraft plugins'
    plugin: nil
    source: https://github.com/nest-desktop/nest-desktop-snap.git

  desktop-launch:
    plugin: dump
    prime:
      - bin/desktop-launch
    source: .
    stage:
      - bin/desktop-launch

  nest-desktop:
    build-packages:
      - gconf2
      - gconf-service
      - libnotify4
      - libnss3
      - libxtst6
      # - xdg-utils
    build-snaps:
      - node/16/stable
    override-build: |
      snapcraftctl build
      yarn install
      yarn electron:build
      dpkg -x ${SNAPCRAFT_PART_BUILD}/dist_electron/*.deb ${SNAPCRAFT_PART_INSTALL}
    plugin: dump
    prime: 
      - -opt/nest-desktop/chrome-sandbox
    source: https://github.com/babsey/nest-desktop.git
    source-depth: 1
    source-branch: electron-builder-deb
    source-type: git
    stage-packages:
      - libnspr4
      - libnss3
      - libxss1
    

  # nest-desktop:
  #   override-build: |
  #     snapcraftctl build
  #   plugin: dump
  #   prime:
  #     - -opt/nest-desktop/chrome-sandbox    # exclude this
  #   source: https://github.com/nest-desktop/nest-desktop/releases/download/v3.2-rc2/nest-desktop_3.2.0-rc2_amd64.deb
  #   source-type: deb
  #   stage-packages:
  #     - libappindicator3-1
  #     - libasound2
  #     - libgbm-dev
  #     - libgl1
  #     - libnspr4
  #     - libnss3
  #     - libsecret-1-0
  #     - libxss1

  nest-simulator:
    conda-miniconda-version: "py310_4.12.0" # https://repo.anaconda.com/miniconda/
    conda-packages:
      - boost>=1.69
      - cmake>=3.12
      - cython
      - flask
      - flask_cors
      - gsl>=1.11
      - gunicorn
      - libtool 
      - nest-simulator
      - numpy
      - openmpi
      - readline
      - requests
      - restrictedpython
      - werkzeug
      - --channel conda-forge
    conda-python-version: "3.10"
    plugin: conda
